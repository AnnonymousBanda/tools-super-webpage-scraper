<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="title-row">
      <img src="icons/icon48.png" alt="Super Webpage Scraper Logo" class="title-logo">
      <h1 class="title">Super Webpage Scraper</h1>
      <span class="badge-beta">BETA</span>
    </div>

    <p class="description">Save any article locally with clean formatting. Extracts text and images — no data leaves your browser.</p>

    <div class="buttons">
      <button id="save-markdown" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M7 15V9L9.5 12L12 9V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 15L14.5 12M14.5 12L17 9M14.5 12H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Save as Markdown</span>
      </button>
      <button id="save-pdf" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6C5.46957 2 4.96086 2.21071 4.58579 2.58579C4.21071 2.96086 4 3.46957 4 4V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 13H10.5C11.163 13 11.5 13.337 11.5 14C11.5 14.663 11.163 15 10.5 15H9V13Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 13V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 13H15C15.5523 13 16 13.4477 16 14V16C16 16.5523 15.5523 17 15 17H14V13Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Save as PDF</span>
      </button>
      <button id="save-images" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
          <path d="M21 15L16 10L5 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Save all Images</span>
      </button>
    </div>

    <div id="unsupported" class="unsupported hidden">
      <div id="unsupported-title" class="unsupported-title">Page Not Supported</div>
      <div id="unsupported-message" class="unsupported-message">This extension only works on regular web pages. Navigate to a website to save it as PDF or Markdown.</div>
      <button id="try-anyway" class="btn btn-secondary hidden">Try anyway</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loading-text" class="loading-text">Converting...</span>
    </div>

    <div id="success" class="success hidden"></div>
    <div id="error" class="error hidden"></div>

    <footer class="footer">Built with ❤️ by MK</footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
